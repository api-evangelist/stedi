description: >
  Stedi is the only API-first programmable healthcare clearinghouse, enabling
  health tech companies to submit claims, verify eligibility, and process
  electronic remittance advice (ERA) through a modern JSON API. The platform
  supports real-time X12 EDI transaction processing including eligibility checks
  (270/271), professional and institutional claim submissions (837), claim status
  inquiries (276/277), and electronic remittance advice (835). Stedi provides
  both SFTP and REST API access, webhooks for event-driven workflows, a sandbox
  test environment, and an MCP server for AI-assisted integration. Public
  OpenAPI specifications are available for all core APIs via the Stedi GitHub
  organization, and pricing is purely metered with no monthly minimums or setup
  fees.
tags:
