          pattern: ^\d{4}(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])(-\d{4}(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01]))?$
          type: string
        admissions:
          description: The date(s) for admission.
          items:
            $ref: '#/components/schemas/DtpDate'
