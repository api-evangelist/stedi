      - Day
      - Years
      - Service Year
      - Calendar Year
      - Year to Date
      - Contract
      - Episode
      - Visit
      - Outlier
      - Remaining
      - Exceeded
      - Not Exceeded
      - Lifetime
      - Lifetime Remaining
      - Month
      - Week
      type: string
    ResponseDependentEntityIdentifier:
