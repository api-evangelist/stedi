components:
  schemas:
    EmploymentStatusCode:
      description: Payers may sometimes return other non-compliant values.
      enum:
      - AE
      - AO
      - AS
      - AT
      - AU
      - CC
      - DD
      - HD
      - IR
      - LX
      - PE
      - RE
      - RM
      - RR
      - RU
      type: string
    UnitForMeasurement:
      description: 'The name of the `unitForMeasurementQualifierCode`. For example, `Days`.


        Payers may sometimes return other non-compliant values.'
      enum:
      - Days
      - Months
      - Visits
      - Week
      - Years
      type: string
    AdditionalInformation:
      properties:
        description:
          description: A free-form message containing additional information about the benefits in the response.
          type: string
      type: object
    DtpDate:
      properties:
        date:
          description: A single date.
          pattern: ^\d{4}(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])$
          type: string
        endDate:
          description: The end date of a range.
          pattern: ^\d{4}(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])$
          type: string
        startDate:
          description: The beginning date of a range.
          pattern: ^\d{4}(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])$
          type: string
      type: object
    EligibilityCheckProviderAndMemberFollowupAction:
      description: Payers may sometimes return other non-compliant values.
      enum:
      - Please Correct and Resubmit
      - Resubmission Not Allowed
      - Resubmission Allowed
      - Do Not Resubmit; Inquiry Initiated to a Third Party
      - Please Wait 30 Days and Resubmit
      - Please Wait 10 Days and Resubmit
      - Do Not Resubmit; We Will Hold Your Request and Respond Again Shortly
      type: string
    InsuranceDiscoveryCheckResponseContent:
      properties:
        coveragesFound:
          description: The number of potential coverage matches for the patient. This will be `0` if Stedi didn't find any matching coverage.
          type: integer
        discoveryId:
          description: A unique ID for this insurance discovery check. You can use it to retrieve the results asynchronously through the [Insurance Discovery Check Results](https://www.stedi.com/docs/healthcare/api-reference/get-insurance-discovery-results) endpoint.
          type: string
        errors:
          description: 'When a payer rejects your eligibility check, the response contains one or more [`AAA` errors](https://www.stedi.com/docs/healthcare/eligibility-troubleshooting#payer-aaa-errors) that specify the reasons for the rejection and any recommended follow-up actions.


            Any errors that occur at the `payer`, `provider`, `subscriber`, or `dependents` levels are also included in this array, allowing you to review all errors in a central location. If there are no `AAA` errors, this array will be empty.'
          items:
            $ref: '#/components/schemas/EligibilityCheckError'
          type: array
        items:
          description: An array of potential coverage matches for the patient. This will only be populated if the insurance discovery check `status` is `COMPLETE`. Each item in the array contains information about a potential match, including the provider, subscriber, payer, and plan information.
          items:
            $ref: '#/components/schemas/InsuranceDiscoveryResponseFields'
          type: array
        meta:
          $ref: '#/components/schemas/InsuranceDiscoveryMetadata'
        status:
          $ref: '#/components/schemas/DiscoveryStatus'
          description: "The status of the discovery check. This is either `PENDING` or `COMPLETE`.\n    - If the status is `COMPLETE`, the `items` array will contain any potential coverage matches Stedi found for the patient.\n    - If the status is `PENDING`, the check is still in progress. You can immediately begin polling the [Insurance Discovery Check Results](https://www.stedi.com/docs/healthcare/api-reference/get-insurance-discovery-results) endpoint to retrieve the results asynchronously."
        warnings:
          description: Issues with your insurance discovery check that may affect the results. For example, Stedi issues a warning when enrolling with a payer would improve the results for future requests.
          items:
            $ref: '#/components/schemas/Warning'
          type: array
      type: object
    ValidationExceptionResponseContent:
      description: 'A standard error for input validation failures.

        Thrown when a member of the input structure

        falls outside of the modeled or documented constraints.'
      properties:
        code:
          description: A code describing the type of validation failure.
          type: string
        message:
          description: A message describing the causes of the validation failure. There may be more than one.
          type: string
      required:
      - message
      type: object
    BenefitsInformationName:
      description: 'The full name of the benefits information code.


        Payers may sometimes return other non-compliant values.'
      enum:
      - Active Coverage
      - Active - Full Risk Capitation
      - Active - Services Capitated
      - Active - Services Capitated to Primary Care Physician
      - Active - Pending Investigation
      - Inactive
      - Inactive - Pending Eligibility Update
      - Inactive - Pending Investigation
      - Co-Insurance
      - Co-Payment
      - Deductible
      - Coverage Basis
      - Benefit Description
      - Exclusions
      - Limitations
      - Out of Pocket (Stop Loss)
      - Unlimited
      - Non-Covered
      - Cost Containment
      - Reserve
      - Primary Care Provider
      - Pre-existing Condition
      - Managed Care Coordinator
      - Services Restricted to Following Provider
      - Not Deemed a Medical Necessity
      - Benefit Disclaimer
      - Second Surgical Opinion Required
      - Other or Additional Payor
      - Prior Year(s) History
      - Card(s) Reported Lost/Stolen
      - Contact Following Entity for Eligibility or Benefit Information
      - Cannot Process
      - Other Source of Data
      - Health Care Facility
      - Spend Down
      type: string
    Contacts:
      description: Contacts
      properties:
        communicationMode:
          $ref: '#/components/schemas/CommunicationMode'
          description: 'The type of communication number provided.


            Payers may sometimes return other non-compliant values.'
        communicationNumber:
          description: "The communication number referenced in `communicationMode`. It includes the country or area code when applicable. \n \n Note that phone numbers are formatted as AAABBBCCCC, where AAA represents the area code, BBB represents the telephone number prefix, and CCCC represents the telephone number. Phone numbers are provided without separators, such as dashes or parentheses. For example, `5551123345` for `555-112-3345`."
          type: string
      type: object
    TimePeriodQualifier:
      description: 'The name of the `timePeriodQualifierCode`. For example, `Calendar Year`.


        Payers may sometimes return other non-compliant values.'
