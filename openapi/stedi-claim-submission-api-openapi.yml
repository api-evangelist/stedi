    ExportPDF400ErrorResponseContent:
      oneOf:
      - $ref: '#/components/schemas/MissingParameter'
      - $ref: '#/components/schemas/ValidationException'
    InstitutionalClaimInformation:
      description: Information about the healthcare claim. Note that the objects and properties marked as required are required for all claims, while others are conditionally required, depending on type of claim and claim circumstances. For example, you must always provide the `claimChargeAmount`, but you only need to provide the `otherSubscriberInformation` object in coordination of benefits scenarios. When you include a conditionally required object, you must provide all of its required properties.
      properties:
        admittingDiagnosis:
          $ref: '#/components/schemas/AdmittingDiagnosis'
          description: The diagnosis for which the patient sought medical care. This may be different from the principal diagnosis.
        benefitsAssignmentCertificationIndicator:
          $ref: '#/components/schemas/InstitutionalClaimInformationBenefitsAssignmentCertificationIndicator'
          description: A code indicating whether the patient or an authorized person has authorized the plan to remit payment directly to the provider. Use `W` when the patient refuses to assign benefits. Can be set to `N` - No (Payment should go to the patient), `Y` - Yes (Payment should go directly to the provider), or `W` - Not Applicable.
        billingNote:
          description: To communicate special instructions regarding claim billing. Required when the provider judges the information is needed to substantiate the medical treatment and cannot be provided elsewhere in the request.
          maxLength: 80
          type: string
        claimChargeAmount:
          description: The total dollar amount charged for the services on this claim, expressed as a decimal. For example, `100.50`. This is the total amount before any adjustments or payments. The amount must balance to the sum of the service line charges.
          pattern: ^\d+(\.\d{1,2})?$
          type: string
        claimCodeInformation:
          $ref: '#/components/schemas/ClaimCodeInformation'
        claimContractInformation:
          $ref: '#/components/schemas/ClaimContractInformation'
        claimDateInformation:
          $ref: '#/components/schemas/InstitutionalClaimDateInformation'
        claimFilingCode:
          $ref: '#/components/schemas/ClaimFilingCode'
        claimFrequencyCode:
          description: "Code specifying the frequency of the claim. Not all payers allow all codes. Can be set to `1` - Admit thru Discharge Claim, `2` - Interim – First Claim, `3` - Interim – Continuing Claim, `4` - Interim – Last Claim, `7` - Replacement, `8` - Void, and `9` - Final Claim for a Home Health PPS Episode.\n  - The claim frequency code and patient status code (`claimInformation.claimCodeInformation.patientStatusCode`) must be compatible. For example, claim frequency code `1` (Admit thru Discharge Claim) means the patient’s stay is finished. In this case, the patient status code shouldn't be `30` (Still a Patient), which indicates the patient is still in the facility.\n  - Set this to `7` when you need to resubmit a corrected claim that the payer has already processed. These are claims that the payer has already adjudicated or claims that the payer has rejected with a 277CA containing the Payer Claim Control Number (PCCN), indicating it has entered the payer's system. Note that Original Medicare doesn't accept code `7` for resubmissions, so you'll need to resubmit with the same code as the original claim.\n  - When resubmitting with code `7` or voiding with code `8`, you must also include the Payer Claim Control Number (sometimes called the ICN) in the `claimInformation.claimSupplementalInformation.claimControlNumber` property. An exception is Original Medicare, which requires that you omit the Payer Claim Control Number from resubmissions.\n  - For resubmissions and cancellations, we strongly recommend including a unique Patient Control Number in the `claimInformation.patientControlNumber` for tracking purposes.\n\nVisit [Resubmit or cancel claims](https://www.stedi.com/docs/healthcare/resubmit-cancel-claims) for complete details."
          maxLength: 1
          type: string
        claimNotes:
          $ref: '#/components/schemas/ClaimNotes'
        claimPricingInformation:
          $ref: '#/components/schemas/ClaimPricingInformation'
          description: Specifies pricing or repricing information about a claim. Required when this information is deemed necessary by the repricer. For capitated encounters, pricing or repricing information is usually not applicable and is provided to qualify other information within the claim.
        claimSupplementalInformation:
          $ref: '#/components/schemas/InstitutionalClaimSupplementalInformation'
        conditionCodes:
          description: "Indicates the condition of the patient for EPSDT referral situations. Can be set to `AV` - Available-Not Used, `NU` - Not Used, `S2` - Under Treatment, `ST` - New Services Requested.\n  - Use `AV` when the patient refused a referral.\n  - Use `S2` when the patient is currently under treatment for the referred diagnostic or corrective health problem.\n  - Use `ST` when the patient is referred to another provider for diagnostic or corrective treatment for at least one health problem identified during an initial or periodic screening service (not including dental referrals) OR the patient is scheduled for another appointment with the screening provider for diagnostic or corrective treatment for at least one health problem identified during an initial or periodic screening service (not including dental referrals)."
          items:
            $ref: '#/components/schemas/ClaimInformationConditionCodesItem'
          maxItems: 12
          minItems: 1
          type: array
        conditionCodesList:
          description: "Required when there is a Condition Code that applies to this claim. \n\n This is an array of arrays of objects. You can provide up to two object arrays, and each array can contain up to 12 objects."
          items:
            items:
              $ref: '#/components/schemas/InstitutionalConditionInformation'
            minItems: 1
            type: array
          maxItems: 2
          minItems: 1
          type: array
        delayReasonCode:
          $ref: '#/components/schemas/InstitutionalDelayReasonCode'
        diagnosisRelatedGroupInformation:
          $ref: '#/components/schemas/DiagnosisRelatedGroupInformation'
          description: Diagnosis related group (DRG) code. Required when an inpatient hospital is under DRG contract with a payer and the contract requires the provider to identify the DRG to the payer.
        epsdtReferral:
          $ref: '#/components/schemas/EpsdtReferral'
        externalCauseOfInjuries:
          description: "Diagnosis codes to describe the patient's condition. Required when an external Cause of Injury is needed to describe an injury, poisoning, or adverse effect. \n\nNote that to fully describe an injury using ICD-10-CM, it will be necessary to report a series of 3 external cause of injury codes. Refer to the [ICD-10-CM Official Guidelines for Coding and Reporting](https://stacks.cdc.gov/view/cdc/158747).\n\nYou can provide up to 12 objects in this array."
          items:
            $ref: '#/components/schemas/ExternalCauseOfInjury'
          maxItems: 12
          minItems: 1
          type: array
        fileInformation:
          description: Used to send additional data specifically requested by the payer. Not commonly used.
          items:
            type: string
          maxItems: 10
          minItems: 1
          type: array
        occurrenceInformationList:
          description: Required when there is a Occurrence Code that applies to this claim. This is an array of arrays of objects. You can provide up to two object arrays, and each array can contain up to 12 objects.
          items:
            items:
              $ref: '#/components/schemas/OccurrenceInformation'
            minItems: 1
            type: array
          maxItems: 2
          minItems: 1
          type: array
        occurrenceSpanInformations:
          description: Required when there is an Occurrence Span Code that applies to this claim. This is an array or arrays of objects. You can provide up to two object arrays and each array can contain up to 12 objects.
          items:
            items:
              $ref: '#/components/schemas/OccurrenceSpanInformation'
            minItems: 1
            type: array
          maxItems: 2
          minItems: 1
          type: array
        otherDiagnosisInformationList:
          description: Additional diagnosis codes relevant to the claim. Required when other condition(s) coexist or develop(s) subsequently during the patient's treatment. This is an array of arrays of objects. You can provide up to two object arrays, and each object array can contain up to 12 objects.
          items:
            items:
              $ref: '#/components/schemas/OtherDiagnosisInformation'
            minItems: 1
            type: array
          maxItems: 2
          minItems: 1
          type: array
        otherProcedureInformationList:
          description: Required on inpatient claims when additional procedures must be reported. This is an array of arrays of objects. You can provide up to two object arrays, and each array can contain up to 12 objects.
          items:
            items:
              $ref: '#/components/schemas/OtherProcedureInformation'
            minItems: 1
            type: array
          maxItems: 2
          minItems: 1
          type: array
        otherSubscriberInformation:
          $ref: '#/components/schemas/InstitutionalOtherSubscriberInformation'
        patientAmountPaid:
          deprecated: true
          type: string
        patientControlNumber:
          description: "An identifier you assign to the claim. We **strongly recommend** submitting a unique value for this property so that you can use it to correlate this claim with responses, such as the [277CA claim acknowledgment](https://www.stedi.com/docs/healthcare/receive-claim-responses#correlate-277ca) and the [835 ERA](https://www.stedi.com/docs/healthcare/receive-claim-responses#correlate-835-era).\n  - Use random strings. The identifier should be more complex than a simple sequential number and should be hard to guess. Formats with patient initials or the date of service in them can create duplicates. We recommend using [nanoid](https://www.npmjs.com/package/nanoid) or a similar library configured with the characters from the [basic character set](https://www.stedi.com/docs/healthcare/submit-institutional-claims#character-restrictions) to generate unique IDs.\n  - Keep it to 17 characters max. Some payers cut off values longer than 17 characters in 277CAs and ERAs, which makes it hard to match them with the original claim.\n  - Use only characters available in the [basic character set](https://www.stedi.com/docs/healthcare/submit-institutional-claims#character-restrictions), and avoid special characters that are only available in the extended character set. Using other characters may result in data loss or mismatches when correlating claims with responses."
          maxLength: 20
          type: string
        patientEstimatedAmountDue:
          description: The total estimated amount the patient must pay for the services listed in this claim. Expressed as a decimal, such as `20.50`. This includes any co-payments, co-insurance, or other costs.
          pattern: ^\d+(\.\d{1,2})?$
          type: string
        patientReasonForVisits:
          description: The diagnosis for which the patient visited an outpatient provider. Required when the claim involves outpatient visits. This may be different from the principal diagnosis. This is an array of objects and you can provide up to three objects.
          items:
            $ref: '#/components/schemas/PatientReasonForVisit'
          maxItems: 3
          minItems: 1
          type: array
        patientWeight:
          deprecated: true
          type: string
        placeOfServiceCode:
          description: Code identifying the type of facility where the services were or may be performed. This must be the two-digit facility type code from the National Uniform Billing Committee [Official UB-04 Data File](https://www.nubc.org/license) (FL 04 - Type of Bill Facility Codes).
          maxLength: 2
          type: string
        planParticipationCode:
          $ref: '#/components/schemas/PlanParticipationCode'
        principalDiagnosis:
          $ref: '#/components/schemas/PrincipalDiagnosis'
          description: This is the diagnosis for the condition determined to be primarily responsible for admission of the patient into the health facility for care.
        principalProcedureInformation:
          $ref: '#/components/schemas/PrincipalProcedureInformation'
          description: The procedure code for the primary procedure performed on the patient. Required on inpatient claims when a procedure was performed.
        propertyCasualtyClaimNumber:
          description: The agency claim number for this transaction. Used when services included in this claim are part of a property and casualty claim. This property is typically not used by Stedi customers.
          type: string
        releaseInformationCode:
          $ref: '#/components/schemas/ReleaseInformationCode'
        serviceFacilityLocation:
          $ref: '#/components/schemas/InstitutionalServiceFacilityLocation'
        serviceLines:
          description: "Information about one or more services rendered to the patient.\n      - Each service line must be a unique service event as defined by the payer's billing policies. This means that you can use the same procedure code on multiple service lines as long as they are distinct events.\n      - Some procedure codes are date-specific. In these cases, you may need to create a separate service line with that code for each applicable date of service, even if the episode of care extended over multiple days.\n      - Service lines can share the same dates of service if the patient received multiple services on the same day."
          items:
            $ref: '#/components/schemas/InstitutionalServiceLine'
          minItems: 1
          type: array
        signatureIndicator:
          deprecated: true
          type: string
        treatmentCodeInformationList:
          description: Required when Home Health Agencies need to report Plan of Treatment information under various payer contracts. This is an array of arrays of strings. You can provide up to two string arrays, and each array can contain up to 12 strings. Each string represents one treatment code.
          items:
            items:
              type: string
            minItems: 1
            type: array
          maxItems: 2
          minItems: 1
          type: array
        valueInformationList:
          description: Required when there is a Value Code that applies to this claim. This is an array of arrays of objects. You can provide up to two object arrays, and each array can contain up to 12 objects.
          items:
            items:
              $ref: '#/components/schemas/ValueInformation'
            minItems: 1
            type: array
          maxItems: 2
          minItems: 1
          type: array
      required:
      - benefitsAssignmentCertificationIndicator
      - claimChargeAmount
      - claimCodeInformation
      - claimDateInformation
      - claimFilingCode
      - claimFrequencyCode
      - patientControlNumber
      - placeOfServiceCode
      - planParticipationCode
      - principalDiagnosis
      - releaseInformationCode
      - serviceLines
      type: object
    InstitutionalServiceLineSupplementalInformation:
      properties:
        attachmentControlNumber:
          description: "A control number assigned to the attachment. The payer uses this identifier to match the attachment to the claim.\n  - You must include either this property or `attachmentId` in the request, but not both. Including both properties will result in an error.\n  - We recommend using a ULID or UUID of up to 50 characters.\n  - Stedi autogenerates a control number if you don't provide one."
          type: string
        attachmentId:
          description: "The unique identifier for the attachment file you previously uploaded to Stedi. This value is returned in the `attachmentId` property of the [Create Claim Attachment (275) JSON](https://www.stedi.com/docs/healthcare/api-reference/post-healthcare-submit-claim-attachment) response. Stedi uses it to generate and submit the 275 claim attachment transaction to the payer.\n  - This property is **required** when you're submitting attachment files through Stedi.\n  - You must include either this property or `attachmentControlNumber` in the request, but not both. Including both properties will result in an error."
          maxLength: 36
          minLength: 36
          pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
