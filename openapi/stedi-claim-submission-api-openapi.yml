          type: string
        editResponses:
          description: Currently not used.
          items:
            $ref: '#/components/schemas/EditResponse'
          type: array
        editStatus:
          deprecated: true
          description: 'This shape is deprecated: Currently not used.'
          type: string
        errors:
          description: Errors resulting from claim edits. You must review and fix these errors before resubmitting.
          items:
            $ref: '#/components/schemas/ClaimsError'
          type: array
        failure:
          $ref: '#/components/schemas/Failure'
