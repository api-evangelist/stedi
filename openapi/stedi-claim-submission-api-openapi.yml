          maxItems: 4
          minItems: 1
          type: array
      required:
      - otherPayerOtherOperatingPhysicianIdentifier
      type: object
    InstitutionalBilling:
      description: 'Information about the billing provider. The following information is required:

        - An `address` that is a physical location such as the office where care is delivered or an administrative facility.

        - The provider''s Employer Identification Number (EIN) in `employerId`.

        - The provider''s business name in `organizationName`.

        - The provider''s [National Provider Identifier (NPI)](https://www.stedi.com/docs/healthcare/national-provider-identifier) in `npi`, if one is assigned. When the billing provider is not assigned an NPI, supply `secondaryIdentifier` with `secondaryIdentificationQualifierCode` set to `G2` (commercial number).'
      properties:
        address:
          $ref: '#/components/schemas/InstitutionalAddress'
          description: 'The provider''s address. This is **required** and must be a physical location such as the office where care is delivered or an administrative facility. If the billing provider expects to receive paper checks at a PO Box, lockbox, or other non-physical address, provide that in `billingPayToAddressName`.


            For United States addresses, you **must** include the full nine-digit zip code with no separators, such as `100031502`. If you don''t know the full zip code, you can find it using the [USPS ZIP Code Lookup](https://tools.usps.com/zip-code-lookup.htm) tool.'
        commercialNumber:
          deprecated: true
          maxLength: 50
          type: string
        contactInformation:
          $ref: '#/components/schemas/InstitutionalContactInformation'
          description: The provider's contact information.You must include at least one communication method (phone, fax, or email) in this object.
        employerId:
          description: The provider's employer ID, also known as an EIN or TIN. Must be a string of exactly nine numbers with no separators.
          maxLength: 50
          type: string
        firstName:
          description: The provider's first name.
          maxLength: 35
          minLength: 1
          type: string
        lastName:
          description: The provider's last name.
          maxLength: 60
          minLength: 1
          type: string
        locationNumber:
          deprecated: true
          maxLength: 50
          type: string
        middleName:
          description: The provider's middle name or initial.
          maxLength: 25
          minLength: 1
          type: string
        npi:
          description: The organization [National Provider Identifier (NPI)](https://www.stedi.com/docs/healthcare/national-provider-identifier). Optional. When the billing provider is not assigned an NPI, supply `secondaryIdentifier` with `secondaryIdentificationQualifierCode` set to `G2` instead.
          pattern: ^\d{10}$
          type: string
        organizationName:
          description: The provider's business name.
          maxLength: 60
          minLength: 1
          type: string
        providerType:
          $ref: '#/components/schemas/BillingProviderType'
          deprecated: true
          description: This field is now automatically populated and it only remains for backwards compatibility.
        providerUpinNumber:
          deprecated: true
          maxLength: 50
          type: string
        secondaryIdentificationQualifierCode:
          $ref: '#/components/schemas/OperatingPhysicianIdentificationQualifierCode'
        secondaryIdentifier:
          description: 'The identifier specified in `secondaryIdentifierQualifierCode`.


            You can only include one secondary identifier for the provider.'
          maxLength: 50
          type: string
        stateLicenseNumber:
          deprecated: true
          type: string
        suffix:
          description: The provider's suffix, such as Jr. or Sr.
          maxLength: 10
          minLength: 1
          type: string
        taxonomyCode:
          description: The provider's [taxnonomy code](https://www.cms.gov/medicare/enrollment-renewal/providers-suppliers/health-care-taxonomy), a unique 10-character code that designates their classification and specialization.
          maxLength: 10
          minLength: 10
          pattern: ^[A-Za-z0-9]{10}$
          type: string
      required:
      - address
      - employerId
      type: object
    InstitutionalClaimAdjustment:
      properties:
        adjustmentGroupCode:
          $ref: '#/components/schemas/InstitutionalAdjustmentGroupCode'
        claimAdjustmentDetails:
          description: The adjustment reason, amount, and quantity. You can include up to six of these objects to describe a single `adjustmentGroupCode`.
          items:
            $ref: '#/components/schemas/InstitutionalClaimAdjustmentDetails'
          maxItems: 6
          minItems: 1
          type: array
      required:
