    OtherDiagnosisInformation:
      properties:
        otherDiagnosisCode:
          description: "A diagnosis code for the patient.\n  - You must submit a valid, billable code at the highest level of specificity. Include the 4th - 7th characters as applicable.\n  - **Don't** submit the decimal point for ICD codes. The decimal point is implied.\n  - **Don't** submit ICD-10 header codes. Header codes exist to group related codes and aren't valid for billing. These header codes can change with each new version of ICD-10, so we recommend reviewing your diagnosis codes every year to ensure that they aren't classified as header codes in the most recent version. To determine whether a code is a header code, you can also search the [Value Set Authority Center](https://vsac.nlm.nih.gov/context/cs). If the 'Header' property is set, the code is a header code and you shouldn't use it in claim submissions."
          maxLength: 30
          type: string
        presentOnAdmissionIndicator:
          $ref: '#/components/schemas/OtherDiagnosisInformationPresentOnAdmissionIndicator'
          description: Indicates whether the other diagnosis was present on admission. Can be set to `N` - No (onset did NOT occur prior to admission to the hospital), `Y` - Yes (onset occurred prior to admission to the hospital), `U` - Unknown, or `W` - Not Applicable.
        qualifierCode:
          $ref: '#/components/schemas/OtherDiagnosisInformationQualifierCode'
      required:
      - otherDiagnosisCode
      - qualifierCode
      type: object
    DentalSubscriber:
      description: 'The person or entity who is the primary policyholder for the health plan _or_ a dependent with their own member ID.

        - When a dependent has a unique, payer-assigned member ID, treat them as the `subscriber` for the claim submission - include their information here and omit the `dependent` object from the request. Note that the subscriber can be an individual or a business entity. Stedi treats the subscriber as an individual when the request doesn''t contain a value for the `subscriber.organizationName` property.

        - You must set the `dateOfBirth` and `gender` properties when the subscriber is the patient. Stedi determines that the subscriber is the patient when the `dependent` object is not included in the request.

        - If either `dateOfBirth` or `gender` is set, you must include both properties. You can either include both properties or neither within a single request.

        - You must include `address` in this object when the patient is the subscriber. If the patient is a dependent, include address information in the `dependent` object instead.'
      properties:
        address:
          $ref: '#/components/schemas/RequestSubscriberDependentAddress'
          description: "The subscriber's address. Every claim must include address information in either the `subscriber` (when the patient is the subscriber) or `dependent` (when the patient is a dependent) object. You must include at least the `address1` and `city` properties in this object. The `state` and `postalCode` properties are also required for all United States and Canadian addresses.\n  - The address must be the patient's correct address at the time of service. Don't use placeholder values to complete unknown address information. Use of outdated or placeholder values could cause the payer to reject, deny, or delay the claim due to suspected fraud.\n  - If you don't know the patient's address, you should first submit a [Real-Time Eligibility Check](https://www.stedi.com/docs/healthcare/api-reference/post-healthcare-eligibility) for the patient and then copy the patient's address from either the `subscriber` or `dependent` object in the response.\n  - If the patient doesn't have a current address, you can populate the `address1` property with `UNKNOWN` and populate the city, state, and zip code with appropriate values based on your discretion. However, some payers may have explicit rules for how to handle this situation, so you should check the payer's specific requirements before using this approach."
        dateOfBirth:
          description: The subscriber's date of birth. This property is **required** if the subscriber is an individual.
          pattern: ^\d{4}(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])$
          type: string
        firstName:
          description: The subscriber's first name. This property is **recommended** when the subscriber is an individual. Some payers reject requests without the `firstName` property.
          type: string
        gender:
          $ref: '#/components/schemas/SubscriberGender'
          description: "Identifies the subscriber's gender. This property is **required** when the subscriber is the patient. Can be set to `F` - Female, `M` - Male, or `U` - Unknown. \n\nSome payers may reject the claim if the patient's gender doesn't match the gender they have recorded in their member records. If the gender isn't known or the patient declines to answer, use `U` or perform an eligibility check to determine the gender according to the payer's records."
        groupNumber:
          description: "The subscriber's health plan group number.\n  - Provide this property OR the `policyNumber`, not both.\n  - Provide this property OR the `subscriberGroupName`, not both. If this property is set, Stedi ignores the `subscriberGroupName` property."
          type: string
        insuranceTypeCode:
          $ref: '#/components/schemas/SubscriberInsuranceTypeCode'
          description: 'Identifies the type of insurance policy within a specific insurance program. This property is **required** when sending claims to Medicare and Medicare is not the primary payer (`paymentResponsibilityLevelCode` is not set to `P`). Otherwise, don''t include this property in the claim.


            Visit [Claims code lists](https://www.stedi.com/docs/healthcare/claims-code-lists#insurance-type-codes) for a complete list of insurance type codes.'
        lastName:
          description: "The subscriber's last name. This property is **required** if the subscriber is an individual.\n\n **Don't** include the subscriber's name suffix, such as Jr. or III. Use the designated `suffix` property instead."
          type: string
        memberId:
          description: The member ID for the subscriber's insurance policy. This property is **required** if the subscriber is an individual.
          maxLength: 80
          minLength: 2
          type: string
        middleName:
          description: The subscriber's middle name or initial.
          type: string
        organizationName:
          description: The business name of the entity submitting the claim. When the subscriber is an organization, you should identify the patient in the `dependent` object.
          maxLength: 60
          minLength: 1
          type: string
        paymentResponsibilityLevelCode:
          $ref: '#/components/schemas/SubscriberPaymentResponsibilityLevelCode'
        policyNumber:
          description: The subscriber's health plan policy number. You should provide either this property OR the `groupNumber`, not both.
          type: string
        ssn:
          description: The subscriber's Social Security Number.
          pattern: ^\d{9}$
          type: string
        subscriberGroupName:
          description: "The name of the subscriber's health plan. For example, Cigna or Blue Cross Blue Shield. \n\nProvide either this property OR the `groupNumber`, not both. If `groupNumber` is set, Stedi ignores this value and uses the value in `groupNumber`."
          type: string
        suffix:
          description: The suffix of the subscriber's name, such as Jr. or Sr. Only include the subscriber's personal name suffix - **don't** include professional or academic titles, such as M.D. or MBA.
          type: string
      type: object
    PrincipalProcedureInformationQualifierCode:
      description: Code identifying the type of procedure code used. Can be set to `BBR` - International Classification of Diseases Clinical Modification (ICD-10-PCS) Principal Procedure Codes, `BR` - International Classification of Diseases Clinical Modification (ICD-9-CM) Principal Procedure Codes, or `CAH` - Advanced Billing Concepts (ABC) Codes. Note that ICD-9 and ABC codes are deprecated and cannot be used in new claims.
      enum:
