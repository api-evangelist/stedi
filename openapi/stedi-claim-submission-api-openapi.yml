        lastName:
          description: The subscriber's last name. **Don't** include the subscriber's name suffix, such as Jr. or III. Use the designated `suffix` property instead.
          maxLength: 60
          minLength: 1
          type: string
        memberId:
          description: The member ID for the subscriber's insurance policy.
          maxLength: 80
          minLength: 2
          type: string
        middleName:
          description: The subscriber's middle name or initial.
          maxLength: 25
          minLength: 1
          type: string
        paymentResponsibilityLevelCode:
          $ref: '#/components/schemas/InstitutionalSubscriberPaymentResponsibilityLevelCode'
          description: "Code identifying the payer's level of responsibility for paying this claim. Visit [Claims code lists](https://www.stedi.com/docs/healthcare/claims-code-lists#payment-responsibility-sequence-number-codes) for a complete list of possible codes.\n  - Stedi sets this property to `P` - Primary by default. You only need to include it when you need to submit codes other than `P`. This can happen when the patient has multiple insurance policies. For example, if a patient is covered by both Medicare and an employer-sponsored commercial plan, you could bill the commercial plan first as `P` and then bill the Medicare payer second as `S`.\n  - Either this property or `otherSubscriberInformation.paymentResponsibilityLevelCode` must be set to `P`. Stedi rejects claims - including secondary and tertiary claims - that don't include information for the primary payer."
        policyNumber:
          deprecated: true
          description: Deprecated.
          maxLength: 50
          type: string
