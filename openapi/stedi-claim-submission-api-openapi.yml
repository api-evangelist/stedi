    OtherPayerBillingProviderEntityTypeQualifier:
      description: Code identifying the type of entity. Can be set to `1` - Person or `2` - Non-Person Entity.
      enum:
      - '1'
      - '2'
      type: string
    ToothSurfaceCode:
      enum:
      - B
      - D
      - F
      - I
      - L
      - M
      - O
      type: string
    OtherPayerOperatingPhysician:
