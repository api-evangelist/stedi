    InstitutionalSubscriber:
      description: 'The person or entity who is the primary policyholder for the health plan _or_ a dependent with their own member ID.

        - When a dependent has a unique, payer-assigned member ID, treat them as the subscriber for the claim submission - include their information here and omit the `dependent` object from the request.

        - You must set the `dateOfBirth` and `gender` properties when the subscriber is the patient. Stedi determines that the subscriber is the patient when the `dependent` object is not included in the request.

        - If either `dateOfBirth` or `gender` is set, you must include both properties. You can either include both properties or neither within a single request.

        - You must include `address` in this object when the patient is the subscriber. If the patient is a dependent, include address information in the `dependent` object instead.'
      properties:
        address:
          $ref: '#/components/schemas/InstitutionalAddress'
          description: "The subscriber's address. Every claim must include address information in either the `subscriber` (when the patient is the subscriber) or `dependent` (when the patient is a dependent) object. You must include at least the `address1` and `city` properties in this object. The `state` and `postalCode` properties are also required for all United States and Canadian addresses.\n   - The address must be the patient's correct address at the time of service. Don't use placeholder values to complete unknown address information. Use of outdated or placeholder values could cause the payer to reject, deny, or delay the claim due to suspected fraud.\n  - If you don't know the patient's address, you should first submit a [Real-Time Eligibility Check](https://www.stedi.com/docs/healthcare/api-reference/post-healthcare-eligibility) for the patient and then copy the patient's address from either the `subscriber` or `dependents` object in the response.\n  - If the patient doesn't have a current address, you can populate the `address1` property with `UNKNOWN` and populate the city, state, and zip code with appropriate values based on your discretion. However, some payers may have explicit rules for how to handle this situation, so you should check the payer's specific requirements before using this approach."
        dateOfBirth:
          description: The subscriber's date of birth, formatted as `YYYYMMDD`.
          pattern: ^\d{4}(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])$
          type: string
        firstName:
          description: The subscriber's first name.
          maxLength: 35
          minLength: 1
          type: string
        gender:
          $ref: '#/components/schemas/GenderWithUnknown'
          description: 'Code identifying the gender. Can be set to `F` - Female, `M` - Male, or `U` - Unknown.


            Some payers may reject the claim if the patient''s gender doesn''t match the gender they have recorded in their member records. If the gender isn''t known or the patient declines to answer, use `U` or perform an eligibility check to determine the gender according to the payer''s records.'
        groupNumber:
          description: The subscriber's health plan group number.
          maxLength: 50
