    ClaimCodeInformation:
      description: Supply information specific to hospital claims, such as the priority of the admission.
      properties:
        admissionSourceCode:
          description: 'Code indicating the source of the admission, such as the emergency room (ER), a doctor’s referral, or another facility.


            This code is **required** for all institutional claims except when the `claimInformation.placeOfServiceCode` is set to `14` (Non-Patient Laboratory). Stedi rejects claims that don''t meet this requirement [Full code list](https://med.noridianmedicare.com/web/jea/topics/claim-submission/point-of-origin-codes).'
          type: string
        admissionTypeCode:
          description: The code indicating the priority of the admission.
          maxLength: 1
          minLength: 1
          type: string
        patientStatusCode:
          description: 'Code indicating patient status as of the end of the claim''s billed period. It tells the payer whether the patient was discharged, transferred, or still admitted.


            This code must be compatible with the `claimInformation.claimFrequencyCode`. For example, claim frequency code `1` (Admit thru Discharge Claim) means the patient''s stay is finished. In this case, the patient status code shouldn''t be `30` (Still a Patient), which indicates the patient is still in the facility. [Full code list](https://med.noridianmedicare.com/web/jea/topics/claim-submission/patient-discharge-status-codes)'
          maxLength: 2
          minLength: 1
          type: string
      required:
      - admissionTypeCode
      - patientStatusCode
      type: object
    InstitutionalSubmitterContactInformation:
      properties:
        email:
          description: The email address.
          type: string
        faxNumber:
          description: The fax number.
          type: string
        name:
          description: The full name of the person or office.
          maxLength: 60
          minLength: 1
          type: string
        phoneNumber:
          description: The phone number, formatted as AAABBBCCCC, where AAA represents the area code, BBB is the telephone number prefix, and CCCC is the telephone number. The phone number should only include the digits 0 to 9. Don't include separators, such as dashes, and don't include long distance access numbers, such as 1. For example, you would format the phone number 123-456-7890 as 1234567890.
          maxLength: 256
          type: string
        validContact:
          deprecated: true
          type: boolean
      type: object
    DentalHealthCareInformation:
      properties:
        diagnosisCode:
          description: "The diagnosis code.\n  - You must submit a valid, billable code at the highest level of specificity. Include the 4th - 7th characters as applicable.\n  - **Don't** submit the decimal point for ICD codes. The decimal point is implied.\n  - **Don't** submit ICD-10 header codes. Header codes exist to group related codes and aren't valid for billing. These header codes can change with each new version of ICD-10, so we recommend reviewing your diagnosis codes every year to ensure that they aren't classified as header codes in the most recent version. To determine whether a code is a header code, you can also search the [Value Set Authority Center](https://vsac.nlm.nih.gov/context/cs). If the 'Header' property is set, the code is a header code and you shouldn't use it in claim submissions."
          type: string
        diagnosisTypeCode:
          $ref: '#/components/schemas/DentalDiagnosisTypeCode'
      required:
      - diagnosisCode
      - diagnosisTypeCode
      type: object
    ServiceLine:
