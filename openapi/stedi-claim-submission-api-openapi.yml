    CodeCategory:
      description: Identifies the category to which the `conditionCode` applies. Can be set to `E1` - Spectacle Lenses, `E2` - Contact Lenses, or `E3` - Spectacle Frames.
      enum:
      - E1
      - E2
      - E3
      type: string
    InstitutionalClaimAdjustmentDetails:
      properties:
        adjustmentAmount:
          description: The dollar amount of the adjustment, expressed as a decimal.
          type: string
        adjustmentQuantity:
          description: The units of service being adjusted, expressed as a decimal.
          type: string
        adjustmentReasonCode:
          description: Code identifying the detailed reason the adjustment was made. Visit the X12 [Claim Adjustment Reason Codes](https://x12.org/codes/claim-adjustment-reason-codes) for a complete list.
          type: string
      required:
      - adjustmentAmount
      - adjustmentReasonCode
      type: object
    Referring:
      description: 'Information about the provider who directed the patient to the rendering provider for care. For example, a primary care physician may refer patients to a specialist. Use when the referring provider applies to the entire claim, not just a specific service line.


        This should be an individual, not an organization, and you should supply at least the provider''s `lastName` and an identifier, which is typically the `npi`.'
      properties:
        address:
          $ref: '#/components/schemas/ClaimsAddress'
          deprecated: true
        commercialNumber:
          description: The provider's commercial number.
          type: string
        contactInformation:
          $ref: '#/components/schemas/ClaimsContactInformation'
          deprecated: true
        firstName:
          description: The provider's first name.
          maxLength: 35
          minLength: 1
          type: string
        lastName:
          description: The provider's last name.
          maxLength: 60
          minLength: 1
