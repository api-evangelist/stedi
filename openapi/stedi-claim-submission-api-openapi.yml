    DentalClaimSupplementalInformation:
      description: Additional information or documentation required for the claim. This is where you can include information about [attachments](https://www.stedi.com/docs/healthcare/submit-claim-attachments), if applicable.
      properties:
        adjustedRepricedClaimNumber:
          description: Required when the repricer believes this information is necessary. Providers should not complete this property.
          type: string
        claimControlNumber:
          description: 'This is the Payer Claim Control Number (PCCN) for an existing claim that this claim is meant to replace or cancel. This property is generally **required** when the `claimInformation.claimFrequencyCode` is set to `7` or `8`. One exception to this guidance is Original Medicare, which specifies that you omit the PCCN from resubmissions.


            Visit [Resubmit or cancel claims](https://www.stedi.com/docs/healthcare/resubmit-cancel-claims) for complete details and information about where to find the PCCN for an existing claim.'
          type: string
        claimNumber:
          deprecated: true
          description: 'The claim number assigned by clearinghouse, van, etc.


            Stedi overwrites this value when it sends the claim to the payer, so you shouldn''t include this property in your request. We strongly recommend using the `claimInformation.patientControlNumber` property as your claim tracking ID.'
          type: string
        predeterminationOfBenefitsIdentifier:
          description: The Predetermination of Benefits Identification Number assigned by the payer. Required for services that have been previously predetermined and are now being submitted for payment. The identifier you supply here applies to the entire claim.
          type: string
        priorAuthorizationNumber:
          description: 'Required when an authorization number is assigned by the payer or UMO _and_ the services on this claim were preauthorized. This authorization number applies to the payer you listed in the `receiver` object. If you need to include authorization numbers for other payers, you can include them in `claimInformation.otherSubscriberInformation.otherPayerName.otherPayerPriorAuthorizationNumber`. The UMO (Utilization Management Organization) is generally the entity empowered to make a decision regarding the outcome of a health services review or the owner of information.


            If there are multiple prior authorization numbers associated with this claim, send one here and then override it as necessary for each service line in `claimInformation.serviceLines[].serviceLineReferenceInformation.priorAuthorization`.'
          type: string
        referralNumber:
          description: Required when a referral number is assigned by the payer or Utilization Management Organization (UMO) _and_ a referral is involved.
          type: string
        reportInformation:
          $ref: '#/components/schemas/DentalReportInformation'
          description: 'Required when you plan to submit an [attachment](https://www.stedi.com/docs/healthcare/submit-claim-attachments) for the claim electronically through Stedi APIs or SFTP, when there is a paper attachment following this claim, or when the provider deems it necessary to identify additional information that is being held at the provider''s office and is available upon request.


            Use this object when there is a single attachment for the claim. If there are multiple attachments, use the `reportInformations` array instead.'
        reportInformations:
          description: 'An array of report information for the claim. Use this when you need to submit multiple report information records. You can submit up to 10 objects in this array.


            Required when you plan to submit [attachments](https://www.stedi.com/docs/healthcare/submit-claim-attachments) for the claim electronically through Stedi APIs or SFTP, when there is a paper attachment following this claim, or when the provider deems it necessary to identify that they have additional information at their office that is available upon request.'
          items:
            $ref: '#/components/schemas/DentalReportInformation'
          maxItems: 10
          minItems: 0
          type: array
        repricedClaimNumber:
          description: Required when the repricer believes this information is necessary. Providers should not complete this property.
          type: string
        serviceAuthorizationExceptionCode:
          $ref: '#/components/schemas/ServiceAuthorizationExceptionCode'
      type: object
    InstitutionalServiceLineReferenceInformation:
