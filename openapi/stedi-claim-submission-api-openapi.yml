    RequestSubscriberDependentAddress:
      description: 'The patient''s address. Every claim must include this information in either the `subscriber` (when the patient is the subscriber) or `dependent` (when the patient is a dependent) object. You must include at least the `address1` and `city` properties in this object. The `state` and `postalCode` properties are also required for all United States and Canadian addresses.

        - The address must be the patient''s correct address at the time of service. Don''t use placeholder values to complete unknown address information. Use of outdated or placeholder values could cause the payer to reject, deny, or delay the claim due to suspected fraud.

        - If you don''t know the patient''s address, you should first submit a [Real-Time Eligibility Check](https://www.stedi.com/docs/healthcare/api-reference/post-healthcare-eligibility) for the patient and then copy the patient''s address from either the `subscriber` or `dependent` object in the response.

        - If the patient doesn''t have a current address, you can populate the `address1` property with `UNKNOWN` and populate the city, state, and zip code with appropriate values based on your discretion. However, some payers may have explicit rules for how to handle this situation, so you should check the payer''s specific requirements before using this approach.'
      properties:
        address1:
          description: The first line of the street address. This typically contains the building number and street name.
          type: string
        address2:
          description: The second line of the street address. This typically contains the apartment or suite number.
          type: string
        city:
          description: The city name.
          type: string
        countryCode:
          description: Use the alpha-2 country codes from Part 1 of ISO 3166.
          type: string
        countrySubDivisionCode:
          description: Use the country subdivision codes from Part 2 of ISO 3166.
          type: string
        postalCode:
          description: The postal zone or zip code. Exclude punctuation and spaces.
          type: string
        state:
          description: The state or province code. Only required when the city is in the Unites States and Canada.
          type: string
      required:
      - address1
      - city
      type: object
    SupportingDocumentation:
      description: Use to provide information in response to a coded questionnaire document.
      properties:
        questionNumber:
          type: string
        questionResponse:
          description: A text response to the question.
          type: string
        questionResponseAsDate:
          description: Date value.
          type: string
        questionResponseAsPercent:
          description: Percent formatted as a decimal.
          type: string
        questionResponseCode:
          $ref: '#/components/schemas/QuestionResponseCode'
      required:
      - questionNumber
      type: object
