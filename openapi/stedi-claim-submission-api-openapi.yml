components:
  schemas:
    PregnancyIndicator:
      description: Code indicating whether the patient is pregnant. Can be set to `Y` - Yes.
      enum:
      - Y
      type: string
    ConflictExceptionResponseContent:
      description: Exception returned when a resource conflict is detected, such as a duplicate submission already in progress.
      properties:
        code:
          description: Unique error code identifying the specific type of error.
          type: string
        message:
          description: Human readable error message explaining why the request was rejected.
          type: string
      required:
      - message
      type: object
    QuestionResponseCode:
      description: Code indicating a yes or no condition response to the question. Can be set to `N` - No, `W` - Not Applicable, or `Y` - Yes.
      enum:
      - N
      - W
      - Y
      type: string
    ContractInformationContractTypeCode:
      description: Code indicating the type of contract. Can be set to `01` - Diagnosis Related Group (DRG), `02` - Per Diem, `03` - Variable Per Diem, `04` - Flat, `05` - Capitated, `06` - Percent, or `09` - Other.
      enum:
      - '01'
      - '02'
      - '03'
      - '04'
      - '05'
      - '06'
      - 09
      type: string
    ValueInformation:
      properties:
        valueCode:
          description: The value code.
          maxLength: 30
          type: string
        valueCodeAmount:
          description: The monetary amount associated with the value code, expressed as a decimal.
