          ConvertReport277_example1:
            description: ''
            summary: Accepted claim
            value: d567c2ae-f073-4725-8b8c-06c473b738a6
          ConvertReport277_example2:
            description: ''
            summary: Denied claim
            value: 71716ec5-0e96-462f-bb77-869941bb27ab
