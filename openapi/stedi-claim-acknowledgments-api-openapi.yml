          description: Human-readable error message
          type: string
      required:
      - message
      type: object
    ClaimsClaimStatus:
      properties:
        billTypeIdentifier:
          description: The bill type identification.
          type: string
        claimServiceBeginDate:
          description: The starting date of the service.
          pattern: ^\d{4}(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])$
          type: string
        claimServiceDate:
          description: The date of the service.
          pattern: ^\d{4}(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])$
          type: string
        claimServiceEndDate:
          description: The ending date of the service.
          pattern: ^\d{4}(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])$
          type: string
        clearinghouseTraceNumber:
          description: The identifier the clearinghouse assigned to the original claim.
          type: string
        informationClaimStatuses:
          description: Claim status information.
          items:
            $ref: '#/components/schemas/InformationClaimStatus'
          type: array
        patientAccountNumber:
          deprecated: true
          description: The patient control number provided in the original claim. Please use `referencedTransactionTraceNumber` to correlate the payer's response with the original claim.
          type: string
        pharmacyPrescriptionNumber:
          deprecated: true
          description: Not used.
          type: string
        referencedTransactionTraceNumber:
          description: "The patient control number provided in the original claim. It's the same as:\n   - Box 26 (Patient's Account No.) on the CMS-1500 submission form.\n  - The `claimInformation.patientControlNumber` in JSON claim submissions.\n\nWe recommend using this value to correlate the payer's response with the original claim. When matching transactions, treat the patient control number as case-insensitive, even if the submitted value included both lower and uppercase characters."
          type: string
        tradingPartnerClaimNumber:
          description: The payer's unique identifier for the claim.
          type: string
        voucherIdentifier:
          deprecated: true
          description: Not used.
          type: string
      type: object
