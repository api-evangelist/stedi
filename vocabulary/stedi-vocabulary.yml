- name: InstitutionalServiceFacilityLocation
  description: 'The service facility location. Required when the location of healthcare
    services is different from the billing provider''s address.

    - When an organization''s healthcare provider''s [NPI](https://www.stedi.com/docs/healthcare/national-provider-identifier)
    is provided to identify the service location, the organization healthcare provider
    must be external to the entity identified as the billing provider (for example,
    a reference lab).

    - The service location can''t be a component or subpart of the billing provider
    entity. Only include this object when the service location is **different** from
    the billing provider''s address. If you include this object when the address is
    the same, Stedi omits all of the service facility location information from the
    claim submission, including the name and any identifiers.

    - Sometimes the billing provider is an actual physician group that is located
    at the same address as a hospital, but is in fact a separate entity. In this case,
    you can differentiate the service facility location by including the specific
    suite or building number of the physician group. This ensures that the service
    facility location is different from the billing provider''s address and is reported
    accurately.'
