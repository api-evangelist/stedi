name: Stedi Vocabulary
description: Domain vocabulary extracted from Stedi OpenAPI specifications covering
  EDI, healthcare clearinghouse, claims, eligibility, enrollment, and event management
  terms.
url: https://www.stedi.com/docs
version: 1.0.0
created: '2026-06-12'
tags: []
terms:
- name: AccessDeniedException
  description: The server response for authorization failure.
  source: healthcare
  type: object
- name: AccessDeniedExceptionResponseContent
  description: The server response for authorization failure.
  source: core
  type: object
- name: AccountNumberQualifier
  description: Identifies the type of bank account being used for electronic payment
    transactions. This specifies whether the account is a checking (demand deposit)
    or savings account.
  source: healthcare
  type: string
- name: AdditionalIdentificationDependent
  description: Use this object when you need to provide an additional identification
    number for the dependent. This is rarely required for standard eligibility checks.
  source: healthcare
  type: object
- name: AdditionalIdentificationSubscriber
  description: 'Use this object when you need to provide an identification number
    other than or in addition to the subscriber''s member ID. For example, you may
    provide the patient account number.


    Don''t include the health insurance claim number or the medicaid recipient ID
    number here unless they are different from the member ID.'
  source: healthcare
  type: object
- name: AdditionalInformation
  description: Schema type from the Stedi healthcare API
  source: healthcare
  type: object
- name: Address
  description: Schema type from the Stedi healthcare API
  source: healthcare
  type: object
- name: AdjustmentGroupCode
  description: Code identifying the general category of payment adjustment. Can be
    set to `CO` - Contractual Obligations, `CR` - Correction and Reversals, `OA` -
    Other Adjustments, `PI` - Payor Initiated Reductions, or `PR - Patient Responsibility.
  source: healthcare
  type: string
- name: Adjustments
  description: Provider adjustment details including reason codes and amounts.
  source: healthcare
  type: object
- name: AdmittingDiagnosis
  description: Schema type from the Stedi healthcare API
  source: healthcare
  type: object
- name: AdmittingDiagnosisQualifierCode
  description: Code identifying the type of admitting diagnosis code used. Can be
    set to `ABJ` - International Classification of Diseases Clinical Modification
    (ICD-10-CM) Admitting Diagnosis or `BJ` - International Classification of Diseases
    Clinical Modification (ICD-9-CM) Admitting Diagnosis. Note that ICD-9 is deprecated
    and cannot be used in new claims.
  source: healthcare
  type: string
- name: AggregationPreference
  description: "Preference for how the payer should group 835 Electronic Remittance\
    \ Advice (ERA) transactions. Only set this property for 835 ERA enrollments.\n\
    \  - If you include this property for a non-ERA enrollment, Stedi rejects the\
    \ enrollment request with an HTTP `400` error.\n  - If the payer doesn't support\
    \ the requested aggregation type, Stedi rejects the enrollment request with an\
    \ HTTP `400` error.\n  - If not set, Stedi automatically selects a default based\
    \ on the payer's supported aggregation types and the available identifiers for\
    \ the provider.\n  - Stedi will attempt to enroll with this preference, but it's\
    \ not guaranteed. Each payer has its own restrictions and behaviors."
  source: enrollment
  type: object
- name: AllEnrolledProviderFields
  description: Complete provider information including both read-only and mutable
    fields.
  source: enrollment
  type: object
- name: AmbulanceCertification
  description: Required when the claim involves ambulance transport services.
  source: healthcare
  type: object
- name: AmbulanceCertificationCertificationConditionIndicator
  description: Code indicating whether there is an ambulance certification.
  source: healthcare
  type: string
- name: AmbulanceCertificationConditionCodesItem
  description: Code indicating the condition of the patient at the time of transport.
    You can provide up to five codes. Visit [Claims code lists](https://www.stedi.com/docs/healthcare/claims-code-lists#ambulance-certification-condition-codes)
    for a complete list.
  source: healthcare
  type: string
- name: AmbulanceTransportInformation
  description: Information about the ambulance service provided to the patient.
  source: healthcare
  type: object
- name: AmbulanceTransportReasonCode
  description: Code indicating the reason for ambulance transport. For example, `A`
    - Patient was transported to nearest facility for care of symptoms, complaints,
    or both. Visit [Claims code lists](https://www.stedi.com/docs/healthcare/claims-code-lists#ambulance-transport-reason-codes)
    for a complete list.
  source: healthcare
  type: string
- name: ApplicationModes
  description: 'The type of data in the request. This is either `production` when
    you send a request with a standard API key or `test` when you send a request in
    test mode with a [test API key](https://www.stedi.com/docs/api-reference/index#api-key-types).
    The `information` value is not currently used.


    Payers may sometimes return other non-compliant values.'
  source: healthcare
  type: string
- name: Artifact
  description: Schema type from the Stedi core API
  source: core
  type: object
- name: ArtifactModel
  description: The model of the artifact, which indicates the type of process or operation
    it represents. For example, an execution artifact represents a file that was processed,
    a fragment artifact represents a part of a larger transaction, and a fault artifact
    represents an error that occurred during processing.
  source: core
  type: string
- name: ArtifactType
  description: The format of the artifact.
  source: core
  type: string
- name: ArtifactUsage
  description: 'The type of data the artifact contains. For example, an input artifact
    represents the original data Stedi received before processing, while an output
    artifact represents the processed data.


    For example, for an inbound 835 ERA from a payer, the input artifact would be
    the original X12 EDI, and the output artifact would be the JSON representation
    of the ERA.'
  source: core
  type: string
- name: AssistantSurgeon
  description: 'Information about the assistant surgeon who rendered the care. Use
    this object when the rendering providers provided these services in the role of
    the assistant surgeon.


    This should be an individual, not an organization, and you should supply at least
    the surgeon''s `lastName`, `taxonomyCode`, and an identifier, which is typically
    the `npi`.'
  source: healthcare
  type: object
- name: AttachmentReportTypeCode
  description: Code indicating the title or contents of a document, report or supporting
    item. For example, `08` - Plan of Treatment or `CT` - Certification. Visit [Claims
    code lists](https://www.stedi.com/docs/healthcare/claims-code-lists#attachment-report-type-codes)
    for a complete list.
  source: healthcare
  type: string
- name: AttachmentsResponseMetadata
  description: Metadata from Stedi about the request.
  source: claims
  type: object
- name: Attending
  description: 'Information about the individual who has overall responsibility for
    the patient''s medical care and treatment reported in the claim. This information
    is required when the claim contains any services other than non-scheduled transportation
    claims.


    This provider should be an individual, not an organization, and you should supply
    at least the provider''s `lastName` and an identifier, which is typically the
    `npi`.'
  source: healthcare
  type: object
- name: AuthOrCertIndicator
  description: 'Code indicating whether the benefit is subject to prior authorization
    or certification.


    Payers may sometimes return other non-compliant values.'
  source: healthcare
  type: string
- name: BadRequestException
  description: The server cannot process the request due to an apparent client error.
  source: healthcare
  type: object
- name: BadRequestExceptionResponseContent
  description: The server cannot process the request due to an apparent client error.
  source: core
  type: object
- name: BenefitRelatedEntityIdentification
  description: 'Code identifying the type of value provided in `entityIdentificationValue`.
    For example, `FI` - Federal Taxpayer''s Identification Number.


    Payers may sometimes return other non-compliant values.'
  source: healthcare
  type: string
- name: BenefitsAdditionalInformation
  description: Identifying information specific to this type of benefit.
  source: healthcare
  type: object
- name: BenefitsDateInformation
  description: "Dates associated with the benefits.\n  - This is where you can find\
    \ benefit-specific eligibility dates, if provided. These dates override dates\
    \ provided in `planDateInformation` for this benefit type.\n  - This is where\
    \ the payer may specify the last time the service was rendered (`latestVisitOrConsultation`),\
    \ which you can use to determine whether the patient has already reached the allowed\
    \ frequency, if applicable. For example, this object could contain the date when\
    \ the patient received their last dental cleaning.\n  - These dates only apply\
    \ to the `benefitsInformation` object in which this `benefitsDateInformation`\
    \ is provided."
  source: healthcare
  type: object
- name: BenefitsInformation
  description: Schema type from the Stedi healthcare API
  source: healthcare
  type: object
- name: BenefitsInformationCode
  description: 'The code indicating the type of benefits information. Visit [Eligibility
    and benefit codes](https://www.stedi.com/docs/healthcare/eligibility-active-coverage-benefits#benefit-type-codes)
    for more information.


    Payers may sometimes return other non-compliant values.'
  source: healthcare
  type: string
- name: BenefitsInformationCoverageLevelCode
  description: "Code indicating the level of coverage for the patient. \n\nThis will\
    \ either be `CHD` - Children Only, `DEP` - Dependents Only, `ECH` - Employee and\
    \ Children, `EMP` - Employee Only, `ESP` - Employee and Spouse, `FAM` - Family,\
    \ `IND` - Individual, `SPC` - Spouse and Children, `SPO` - Spouse Only, or `Unknown`.\n\
    \nPayers may sometimes return other non-compliant values."
  source: healthcare
  type: string
- name: BenefitsInformationCoverageLevelName
  description: 'The full name of the coverage level code.


    Payers may sometimes return other non-compliant values.'
  source: healthcare
  type: string
- name: BenefitsInformationName
  description: 'The full name of the benefits information code.


    Payers may sometimes return other non-compliant values.'
  source: healthcare
  type: string
- name: BenefitsRelatedEntity
  description: 'Identify another entity associated with the eligibility or benefits.
    This could be a provider, an individual, an organization, or another payer.


    This array is commonly used to designate the patient''s primary care provider
    (PCP), another organization that handles a specific carveout benefit type, or
    another health plan for the patient (coordination of benefits scenarios).


    This is where information for a crossover carrier such as Medicaid or Medicare
    is provided, if it''s applicable to the patient and the payer supports it.'
  source: healthcare
  type: object
- name: BenefitsRelatedEntityRelationshipCode
  description: 'Code specifying the relationship between the entity and the patient.


    Payers may sometimes return other non-compliant values.'
  source: healthcare
  type: string
- name: BenefitsServiceDelivery
  description: The delivery or usage pattern for the benefits.
  source: healthcare
  type: object
- name: BenefitsServiceDeliveryQuantityQualifier
  description: 'The name of the `quantityQualifierCode`. For example, `Days`.


    Payers may sometimes return other non-compliant values.'
  source: healthcare
  type: string
- name: BenefitsServiceDeliveryQuantityQualifierCode
  description: 'Code specifying the type of quantity.


    Payers may sometimes return other non-compliant values.'
  source: healthcare
  type: string
- name: Billing
  description: 'Information about the billing provider.

    - You must provide an `address` that is a physical location such as the office
    where care is delivered or an administrative facility.

    - For tax identification, you must include either the provider''s Social Security
    Number (SSN) in the `ssn` property _or_ their Employer Identification Number (EIN)
    in the `employerId` property, but not both.

    - If the billing provider has an NPI, you must include it in the `npi` property.
    If the billing provider does not have an NPI, you must include either the `commercialNumber`
    or the `locationNumber` for identification. Some payers may require the `npi`
    **and** either the `commercialNumber` or the `locationNumber` as a secondary identifier.

    - Some solo providers may use their SSN as their EIN. In this case, submit the
    SSN in the `ssn` property and leave the `employerId` property blank.'
  source: healthcare
  type: object
- name: BillingProviderType
  description: Defines the billing provider type.
  source: healthcare
  type: string
- name: BusinessContactInformation
  description: A person or office to whom administrative communications should be
    directed.
  source: healthcare
  type: object
- name: BusinessIdentifier
  description: Schema type from the Stedi core API
  source: core
  type: object
- name: COB
  description: Schema type from the Stedi healthcare API
  source: healthcare
  type: object
- name: COBBenefitsDateInformation
  description: Dates associated with the benefits. Dates listed only apply to the
    `benefitsInformation` object in which this benefitsDateInformation is provided.
  source: healthcare
  type: object
- name: COBBenefitsInformation
  description: Schema type from the Stedi healthcare API
  source: healthcare
  type: object
- name: COBBenefitsInformationName
  description: The full name of the benefits information code.
  source: healthcare
  type: string
- name: COBBenefitsRelatedEntity
  description: Schema type from the Stedi healthcare API
  source: healthcare
  type: object
- name: COBDependent
  description: 'A dependent for which you want to check coordination of benefits.

    - An individual qualifies as a dependent when they are listed as a dependent on
    the subscriber''s insurance plan AND the payer cannot uniquely identify them through
    information outside the subscriber''s policy. For example, if the dependent has
    their own member ID number, you should identify them in the `subscriber` object
    instead.

    - The demographic information you provide **must** patch the payer''s data exactly.
    For example, if the payer has the dependent''s name as `Jonathan Doe`, a COB request
    for `Jon Doe` will fail because the name doesn''t match the payer''s records.'
  source: healthcare
  type: object
- name: COBEncounter
  description: 'Information about the encounter.

    - You can submit COB checks with the `30` service type code for Health Benefit
    Plan Coverage. This is the broadest service type code that covers all medical
    services and subtypes included in the patient’s health plan.

    - The service dates you provide **must** be within the past 2 years. COB checks
    don''t support requests with dates outside of this range.

    - Don''t send service dates that are in the future. Future service dates typically
    result in errors from the payer.

    - If you don''t specify a service date (either a single day or a range of dates),
    Stedi defaults to using the current date.'
  source: healthcare
  type: object
- name: COBMetaData
  description: Schema type from the Stedi healthcare API
  source: healthcare
  type: object
- name: COBPayer
  description: Schema type from the Stedi healthcare API
  source: healthcare
  type: object
- name: COBPlanDateInformation
  description: 'Dates associated with the patient''s health plan coverage. This information
    is used to determine their eligibility for benefits.

    - The provided dates apply to every benefit within the patient''s health plan
    unless specifically noted within a `benefitsInformation[].benefitsDateInformation`
    object.

    - If the payer sends back date(s) that are different for the subscriber and dependents,
    Stedi includes only the dates for the dependent in this object and omits the subscriber''s
    date(s). Dependents can have different coverage dates than the subscriber due
    to qualifying life events, such as starting a new job or passing the age limit
    for coverage through their parent''s plan.'
  source: healthcare
  type: object
- name: COBProvider
  description: Information about the entity requesting the coverage.
  source: healthcare
  type: object
- name: COBResponseBenefitsInformationCode
  description: The code indicating the type of benefits information. Can be `1` -
    Active Coverage, `6` - Inactive, `R` - Other or Additional Payor, or `V` - Cannot
    Process.
  source: healthcare
  type: string
- name: COBResponseBenefitsInformationSubscriber
  description: Schema type from the Stedi healthcare API
  source: healthcare
  type: object
- name: COBResponseDependent
  description: Information about the dependent listed in the original COB request.
  source: healthcare
  type: object
- name: COBResponseProvider
  description: Information about the entity that submitted the original eligibility
    check request. This may be an individual practitioner, a medical group, a hospital,
    or another type of healthcare provider.
  source: healthcare
  type: object
- name: COBResponseServiceTypeCode
  description: Code identifying the type of services included in a `benefitsInformation`
    object.
  source: healthcare
  type: string
- name: COBResponseServiceTypeCodeName
  description: The names of the `benefitsInformation[].serviceTypeCodes` included
    in the response.
  source: healthcare
  type: string
- name: COBResponseSubscriber
  description: Information about the primary policyholder for the insurance plan listed
    in the COB request.
  source: healthcare
  type: object
- name: COBServiceTypeCode
  description: The service type code for the encounter. If not provided, the default
    value is `30`.
  source: healthcare
  type: string
- name: COBSubscriber
  description: "The primary policyholder for the insurance plan _or_ a dependent with\
    \ a unique member ID. If a dependent has a unique member ID, include their information\
    \ here and leave `dependent` empty.\n\n\n\nThe demographic information you provide\
    \ **must** match the payer's data exactly. For example, if the payer has the subscriber's\
    \ name as `Jonathan Doe`, a COB request for `Jon Doe` will fail because the name\
    \ doesn't match the payer's records. Also note that:\n  - Any prefix on the member's\
    \ card is considered part of the `memberID` used for the search.\n  - Mismatches\
    \ in the `memberId` are one of the most common causes of `Member Not Found` errors.\
    \ We strongly recommend first performing an [Eligibility Check](https://www.stedi.com/docs/healthcare/api-reference/post-healthcare-eligibility)\
    \ and using the `memberId` in the response to populate your COB check.\n  - We\
    \ recommend including the `ssn` property in addition to the `memberId` if possible.\
    \ This allows Stedi to do an additional search for the patient when the `memberId`\
    \ doesn't return a match.\n  - Stedi can identify coverage overlap for the same\
    \ payer if the member ID differs between the two coverages."
  source: healthcare
  type: object
- name: CertificationConditionCodeAppliesIndicator
  description: Code indicating whether an EPSDT referral was given to the patient.
    Can be set to `N` - No or `Y` - Yes.
  source: healthcare
  type: string
- name: CertificationTypeCode
  description: Code indicating the type of certification. Can be set to `I` - Initial,
    `R` - Renewal, or `S` - Revised.
  source: healthcare
  type: string
- name: Claim
  description: Information about the claim and its status.
  source: healthcare
  type: object
- name: ClaimAcknowledgmentDetails
  description: Schema type from the Stedi healthcare API
  source: healthcare
  type: object
- name: ClaimAcknowledgmentDetailsServiceProvider
  description: Information about the service provider.
  source: healthcare
  type: object
- name: ClaimAcknowledgmentPayer
  description: Schema type from the Stedi healthcare API
  source: healthcare
  type: object
- name: ClaimAcknowledgmentServiceIdQualifierCode
  description: Code identifying the source of the procedure code in claim status reports.
  source: healthcare
  type: string
- name: ClaimAcknowledgmentServiceIdQualifierCodeValue
  description: Human-readable descriptions for service ID qualifier codes.
  source: healthcare
  type: string
- name: ClaimAcknowledgmentServiceLines
  description: Schema type from the Stedi healthcare API
  source: healthcare
  type: object
- name: ClaimAcknowledgmentServiceLinesService
  description: Information about the service provided.
  source: healthcare
  type: object
- name: ClaimAcknowledgmentTransactions
  description: Schema type from the Stedi healthcare API
  source: healthcare
  type: object
- name: ClaimAcknowledgmentTransactionsProvider
  description: Information about the provider receiving the claim status details.
  source: healthcare
  type: object
- name: ClaimAdjustment
  description: Schema type from the Stedi healthcare API
  source: healthcare
  type: object
- name: ClaimAdjustmentDetails
  description: The adjustment reason codes and amounts. You can include up to six
    objects in this array to describe a single adjustment group code.
  source: healthcare
  type: object
- name: ClaimAdjustmentGroupCode
  description: Defines the category of adjustment reason codes that explain why a
    claim payment was adjusted. These codes categorize adjustments into contractual
    obligations, payer-initiated reductions, patient responsibilities, and other adjustments.
  source: healthcare
  type: string
- name: ClaimAdjustments
  description: Claim-level adjustments with reason codes and amounts.
  source: healthcare
  type: object
- name: ClaimAttachmentReference
  description: Information about the claim attachment.
  source: claims
  type: object
- name: ClaimCodeInformation
  description: Supply information specific to hospital claims, such as the priority
    of the admission.
  source: healthcare
  type: object
- name: ClaimContractInformation
  description: Required when the submitter is contractually obligated to supply this
    information on post-adjudicated claims.
  source: healthcare
  type: object
- name: ClaimContractInformationContractTypeCode
  description: A code identifying the type of contract. Can be set to `01` - Diagnosis
    Related Group (DRG), `02` - Per Diem, `03` - Variable Per Diem, `04` - Flat, `05`
    - Capitated, `06` - Percent, or `09` - Other.
  source: healthcare
  type: string
- name: ClaimDateInformation
  description: You must provide at least one date related to the claim. For example,
    the date on which the patient was admitted to the hospital.
  source: healthcare
  type: object
- name: ClaimFilingCode
  description: 'A code identifying the type of claim. For example `DS` - Disability.

    - Use `OF` when submitting Medicare Part D claims.

    - Use `ZZ` when you don''t know the type of insurance.

    - Some payers reject claims with invalid codes. If you''re not sure which code
    to use, we recommend running a [real-time eligibility check](https://www.stedi.com/docs/healthcare/api-reference/post-healthcare-eligibility)
    and using the value returned in the most relevant `benefitsInformation.insuranceTypeCode`
    property. Note that the eligibility response uses a different code list than claims,
    so you may need to map that code value to the appropriate claim filing code.



    Visit [Claims code lists](https://www.stedi.com/docs/healthcare/claims-code-lists#claim-filing-indicator-codes)
    for a complete list.'
  source: healthcare
  type: string
- name: ClaimFilingIndicatorCode
  description: A code identifying the type of claim. For example `DS` - Disability.
    Use `OF` when submitting Medicare Part D claims. Use `ZZ` when you don't know
    the type of insurance. Visit [Claims code lists](https://www.stedi.com/docs/healthcare/claims-code-lists#claim-filing-indicator-codes)
    for a complete list.
  source: healthcare
  type: string
- name: ClaimFrequencyCode
  description: 'Identify the type of claim. Can be set to: `1` - indicates an original
    claim, `7` - Indicates the new claim is a replacement or correction, `8` - Indicates
    the claim is void or canceled'
  source: healthcare
  type: string
- name: ClaimIdentifier
  description: "A code specifying the type of transaction. Defaults to `CH` if not\
    \ provided.\n  - `31`: Only for use by state Medicaid agencies performing post\
    \ payment recovery.\n  - `CH`: Use when the transaction contains only fee for\
    \ service claims or claims with at least one chargeable line item. Also use when\
    \ it's not clear whether a transaction contains claims or capitated encounters,\
    \ or if the transaction contains a mix of claims and capitated encounters.\n \
    \ - `RP`: Use for capitated encounters. Also use when the transaction is being\
    \ sent to an entity for purposes other than adjudication of a claim. For example,\
    \ when you're sending the claim to a state health agency that is using the claim\
    \ for health data reporting purposes."
  source: healthcare
  type: string
- name: ClaimInformation
  description: "Information about the healthcare claim. \n\nNote that the objects\
    \ and properties marked as **required** are required for all claims, while others\
    \ are conditionally required, depending on type of claim and claim circumstances.\
    \ For example, you must always provide the patient's diagnosis codes in the `healthCareCodeInformation`\
    \ object, but you only need to provide the `otherSubscriberInformation` object\
    \ in coordination of benefits scenarios. When you include a conditionally required\
    \ object, you must provide all of its required properties."
  source: healthcare
  type: object
- name: ClaimInformationBenefitsAssignmentCertificationIndicator
  description: A code indicating whether the patient or an authorized person has authorized
    the plan to remit payment directly to the provider. Use `W` when the patient refuses
    to assign benefits. Can be set to `N` - No (Payment should go to the patient),
    `Y` - Yes (Payment should go directly to the provider), or `W` - Not Applicable
    (use when patient refuses to assign benefits).
  source: healthcare
  type: string
- name: ClaimInformationConditionCodesItem
  description: Schema type from the Stedi healthcare API
  source: healthcare
  type: string
- name: ClaimInformationRelatedCausesCodeItem
  description: Code identifying an accompanying cause of an illness, injury or an
    accident. Can be set to `AA` - Auto Accident, `EM` - Employment, or `OA` - Other
    Accident.
  source: healthcare
  type: string
- name: ClaimLevelEntityIdentifierCode
  description: Entity identifier code for claim level in claim status reports
  source: healthcare
  type: string
- name: ClaimLevelEntityIdentifierCodeValue
  description: Human-readable descriptions for claim level entity identifier codes
  source: healthcare
  type: string
- name: ClaimLevelStatus
  description: Schema type from the Stedi healthcare API
  source: healthcare
  type: object
- name: ClaimNote
  description: Comments or special instructions related to the claim. Contains information
    required to substantiate the medical treatment that isn't provided elsewhere in
    the claim.
  source: healthcare
  type: object
- name: ClaimNotes
  description: Free-form information to substantiate the medical treatment that isn't
    provided elsewhere in the claim submission. Also used to provide narrative information
    from the forms Home Health Certification and Plan of Treatment or Medical Update
    and Patient Information, as needed to substantiate home health services. You can
    provide up to 10 strings in this array.
  source: healthcare
  type: object
- name: ClaimPaymentAdviceFilingIndicatorCode
  description: Identifies the type of health plan or insurance coverage under which
    the claim was filed. These codes indicate the specific type of insurance arrangement,
    government program, or coverage type that applies to the claim.
  source: healthcare
  type: string
- name: ClaimPaymentAdvicePayer
  description: Information about the payer.
  source: healthcare
  type: object
- name: ClaimPaymentAdvicePayerAddress
  description: Address information for the payer.
  source: healthcare
  type: object
- name: ClaimPaymentAdviceResponse
  description: The complete claim payment advice response from the payer.
  source: healthcare
  type: object
- name: ClaimPaymentAdviceResponseFinancialInformation
  description: Information about a payment, including the payment method, payment
    amount, and account details for both the sender and receiver.
  source: healthcare
  type: object
- name: ClaimPaymentAdviceResponsePaymentAndRemitReassociationDetails
  description: Information to uniquely identify the transaction and help with reassociating
    payments and remittances that have been separated.
  source: healthcare
  type: object
- name: ClaimPaymentAdviceServiceLines
  description: Information about specific service lines in the claim payment advice.
  source: healthcare
  type: object
- name: ClaimPaymentAdviceServiceLinesRenderingProviderInformation
  description: Identifiers for the provider who rendered this service.
  source: healthcare
  type: object
- name: ClaimPaymentAdviceServiceLinesServiceIdentification
  description: Additional identifiers related to the service line.
  source: healthcare
  type: object
- name: ClaimPaymentAdviceServiceLinesServicePaymentInformation
  description: Payment and control information about a provider for a particular service.
  source: healthcare
  type: object
- name: ClaimPaymentAdviceServiceLinesServiceSupplementalAmounts
  description: Information about the service supplemental amount. All values are expressed
    as decimals.
  source: healthcare
  type: object
- name: ClaimPaymentAdviceServiceLinesServiceSupplementalQuantities
  description: Additional quantity information about the service. All values are expressed
    as decimals.
  source: healthcare
  type: object
- name: ClaimPaymentEnrollmentProcess
  description: Details about the enrollment process for Electronic Remittance Advice
