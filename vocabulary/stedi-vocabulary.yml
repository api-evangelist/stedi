- name: InstitutionalSubscriber
  description: 'The person or entity who is the primary policyholder for the health
    plan _or_ a dependent with their own member ID.

    - When a dependent has a unique, payer-assigned member ID, treat them as the subscriber
    for the claim submission - include their information here and omit the `dependent`
    object from the request.

    - You must set the `dateOfBirth` and `gender` properties when the subscriber is
    the patient. Stedi determines that the subscriber is the patient when the `dependent`
    object is not included in the request.

    - If either `dateOfBirth` or `gender` is set, you must include both properties.
    You can either include both properties or neither within a single request.

    - You must include `address` in this object when the patient is the subscriber.
    If the patient is a dependent, include address information in the `dependent`
    object instead.'
