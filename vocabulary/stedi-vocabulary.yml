- name: InstitutionalRendering
  description: 'Information about the provider who delivered the medical services
    or non-surgical procedures listed in the claim. This must be an individual, not
    an organization, and you must supply at least the provider''s `lastName` and an
    identifier, which is typically the `npi`. The provider''s `firstName` is also
    required, if applicable.


    Include this object when all of the following are true:

    - The rendering provider is different than the provider listed in the `attending`
    object.

    - The provider applies to the entire claim or to at least one service line. For
    example, if a claim had two service lines with two different rendering providers,
    you would include the provider for the first service line here and leave the `claimInformation.serviceLines[].renderingProvider`
    object for that service line blank. Then, you would specify the second provider
    in the appropriate service line''s `claimInformation.serviceLines[].renderingProvider`
    object.

    - State or federal regulatory requirements call for a combined claim. A combined
    claim includes both facility and professional components, such as a Medicaid clinic
    bill or a critical access hospital claim.'
