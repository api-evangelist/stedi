    \ prepopulated options for contact information when creating enrollment requests\
    \ for this provider in the Stedi portal. They aren't automatically added to enrollment\
    \ requests.\n\nThese contacts should specify where payers should send communications\
    \ about the enrollment, if needed.\n  - Either `organizationName` _or_ `firstName`\
    \ and `lastName` are required.\n  - The name and address should match exactly\
    \ what the payer has on file for the provider. Some payers reject enrollment requests\
    \ with addresses that don't match their records.\n  - If you're submitting enrollment\
    \ requests on a provider's behalf, you may want to set the phone number and email\
    \ to your own contact details. Do this when you want the payer to contact you\
    \ about the enrollment status instead of the provider directly.\n  - These contacts\
    \ are for convenience only. You can specify different contacts on enrollment requests\
    \ as needed."
  source: enrollment
  type: object
