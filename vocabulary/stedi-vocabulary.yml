- name: Supervising
  description: 'The entity responsible for overseeing the rendering provider and the
    care reported in this claim. Applies when the rendering provider is supervised
    by a physician. Use when the provider applies to the entire claim, not just a
    specific service line.


    This should be an individual, not an organization, and you should supply at least
    the provider''s `lastName` and an identifier, which is typically the `npi`.'
  source: healthcare
