- name: Submitter
  description: The entity submitting the healthcare claim. This can be either an individual
    or an organization, such as a doctor, hospital, or insurance company. You must
    submit at least `organizationName` or `lastName` properties and the `contactInformation`
    object. If you don't supply the `submitterIdentification` property, Stedi uses
    the value from `billing.npi` in the request.
  source: healthcare
  type: object
- name: Subscriber
  description: 'The person or entity who is the primary policyholder for the health
    plan _or_ a dependent with their own member ID. The subscriber can be an individual
    or a business entity.

    - When a dependent has a unique, payer-assigned member ID, treat them as the `subscriber`
    for the claim submission - include their information here and omit the `dependent`
    object from the request.  Stedi treats the subscriber as an individual when the
    request doesn''t contain a value for the `subscriber.organizationName` property.

    - You must set the `dateOfBirth` and `gender` properties when the subscriber is
    the patient. Stedi determines that the subscriber is the patient when the `dependent`
    object is not included in the request.

    - If either `dateOfBirth` or `gender` is set, you must include both properties.
    You can either include both properties or neither within a single request.

    - You must include `address` in this object when the patient is the subscriber.
    If the patient is a dependent, include address information in the `dependent`
    object instead.'
  source: healthcare
  type: object
- name: SubscriberGender
  description: "Identifies the subscriber's gender. Can be set to `F` - Female, `M`\
    \ - Male, or `U` - Unknown. \n\nThis property is **required** if the subscriber\
    \ is an individual. \n\nYou should set this property to `U` when the patient declines\
    \ to answer or does not identify as male or female. Note that some payers may\
    \ reject the claim if the patient's gender doesn't match the gender they have\
    \ recorded in their member records."
  source: healthcare
  type: string
- name: SubscriberInsuranceTypeCode
  description: Identifies the type of insurance policy within a specific insurance
    program. Visit [Claims code lists](https://www.stedi.com/docs/healthcare/claims-code-lists#insurance-type-codes)
    for a complete list.
  source: healthcare
  type: string
- name: SubscriberInsuredIndicator
  description: Indicates the status of the insured. For the subscriber, this is always
    `Y`.
  source: healthcare
  type: string
- name: SubscriberPaymentResponsibilityLevelCode
  description: "Code identifying the payer's level of responsibility for paying this\
    \ claim. Visit [Claims code lists](https://www.stedi.com/docs/healthcare/claims-code-lists#payment-responsibility-sequence-number-codes)\
    \ for a complete list of possible codes.\n  - Stedi sets this property to `P`\
    \ - Primary by default. You only need to include it when you need to submit codes\
    \ other than `P`. This can happen when the patient has multiple insurance policies.\
    \ For example, if a patient is covered by both Medicare and an employer-sponsored\
    \ commercial plan, you could bill the commercial plan first as `P` and then bill\
    \ the Medicare payer second as `S`.\n  - Either this property or `otherSubscriberInformation.paymentResponsibilityLevelCode`\
    \ must be set to `P` to indicate the primary insurance payer. Stedi rejects claims\
    \ - including secondary and tertiary claims - that don't include information for\
    \ the primary payer."
  source: healthcare
  type: string
- name: SubscriberRelationship
  description: The name of the `relationToSubscriberCode`. For the subscriber, this
    is always `Self`.
  source: healthcare
  type: string
- name: SubscriberRelationshipCode
  description: For the subscriber, this is always `18` for Self.
  source: healthcare
  type: string
- name: SubscriberTraceNumber
