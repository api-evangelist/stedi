- name: RequestSubscriber
  description: 'The primary policyholder for the insurance plan _or_ a dependent with
    a unique member ID. If a dependent has a unique member ID, include their information
    here and leave `dependents` empty.

    - At a minimum, our API requires that you supply at least one of these fields
    in the request: `memberId`, `dateOfBirth`, or `lastName`. However, each payer
    has different requirements, so you should supply the fields necessary for each
    payer to identify the subscriber in their system.

    - When you provide all four of `memberId`, `dateOfBirth`, `firstName`, and `lastName`,
    payers are required to return a response if the member is in their database. Some
    payers may be able to search with less information, but this varies by payer.

    - We recommend always including the patient''s member ID when possible.

    - Enter the patient''s name exactly as written on their insurance card, if available,
    including any special or punctuation characters such as apostrophes, hyphens (dashes),
    or spaces. Visit [patient names](https://www.stedi.com/docs/healthcare/send-eligibility-checks#patient-names)
    for all best practices to avoid unnecessary failures.'
  source: healthcare
  type: object
- name: RequestSubscriberAddress
  description: "Address information for the subscriber. When providing address information:\n\
    \  - The `address1` and `city` properties are **required** for standard eligibility\
    \ checks and MBI lookups with SSN. We also recommend including `state` for member\
    \ identification.\n  - When performing an [MBI lookup without SSN](https://www.stedi.com/docs/healthcare/mbi-lookup)\
    \ (Payer ID: `MBILUNOSSN`), only `state` is required. You can omit `address1`\
    \ and `city`."
  source: healthcare
  type: object
- name: RequestSubscriberDependentAddress
  description: 'The patient''s address. Every claim must include this information
    in either the `subscriber` (when the patient is the subscriber) or `dependent`
    (when the patient is a dependent) object. You must include at least the `address1`
    and `city` properties in this object. The `state` and `postalCode` properties
    are also required for all United States and Canadian addresses.

    - The address must be the patient''s correct address at the time of service. Don''t
    use placeholder values to complete unknown address information. Use of outdated
    or placeholder values could cause the payer to reject, deny, or delay the claim
    due to suspected fraud.

    - If you don''t know the patient''s address, you should first submit a [Real-Time
    Eligibility Check](https://www.stedi.com/docs/healthcare/api-reference/post-healthcare-eligibility)
    for the patient and then copy the patient''s address from either the `subscriber`
    or `dependent` object in the response.

    - If the patient doesn''t have a current address, you can populate the `address1`
    property with `UNKNOWN` and populate the city, state, and zip code with appropriate
    values based on your discretion. However, some payers may have explicit rules
    for how to handle this situation, so you should check the payer''s specific requirements
    before using this approach.'
  source: healthcare
  type: object
- name: RequestSubscriberProviderCode
  description: "Use this for providers that are not requesting the eligibility check\
    \ - the requestor is specified in the `provider` object. For example, if you are\
    \ a hospital making an eligibility request, this is where you would specify information\
    \ about a referring provider's role. \n\n This property is **required** when the\
    \ `providerIdentifier` and `referenceIdentificationQualifier` properties are populated.\
    \ \n\n You can use one of the following: `AD` - Admitting, `AT` - Attending, `BI`\
    \ - Billing, `CO` - Consulting, `CV` - Covering, `H` - Hospital, `HH` - Home Health\
    \ Care, `LA` - Laboratory, `OT` - Other Physician, `P1` - Pharmacist, `P2` - Pharmacy,\
    \ `PC` - Primary Care Physician, `PE` - Performing, `R` - Rural Health Clinic,\
    \ `RF` - Referring, `SB` - Submitting, `SK` - Skilled Nursing Facility, `SU` -\
    \ Supervising"
  source: healthcare
  type: string
- name: RequestSubscriberReferenceIdentificationQualifier
  description: "Use this for providers that are not requesting the eligibility check.\
    \ This is the type of `providerIdentifier` you are providing.\n- Set to `HPI`\
    \ when the National Provider ID is mandated for use.\n- Set to `PXC` if you're\
    \ identifying a type of specialty associated with services provided to the subscriber.\
    \ \n \n Otherwise, you can set to the following: `9K` - Servicer, `D3` - National\
    \ Council for Prescription Drug Programs Pharmacy Number, `EI` - Employer's Identification\
    \ Number, `HPI` - Centers for Medicare and Medicaid Services National Provider\
    \ Identifier, `PXC` - Health Care Provider Taxonomy Code, `SY - Social Security\
    \ Number, `TJ` - Federal Taxpayer's Identification Number"
  source: healthcare
  type: string
