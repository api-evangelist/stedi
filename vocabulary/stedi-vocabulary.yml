    - Set to `HPI` when the National Provider ID is mandated for use.\n- Set to `PXC`\
    \ if you're identifying a type of specialty associated with services provided\
    \ to the dependent. \n \n Otherwise, you can set to the following: `9K` - Servicer,\
    \ `D3` - National Council for Prescription Drug Programs Pharmacy Number, `EI`\
    \ - Employer's Identification Number, `HPI` - Centers for Medicare and Medicaid\
    \ Services National Provider Identifier, `PXC` - Health Care Provider Taxonomy\
    \ Code, `SY` - Social Security Number, `TJ` - Federal Taxpayer's Identification\
    \ Number"
