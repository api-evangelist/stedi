    who rendered the care. Use this object for all types of rendering providers including
    laboratories. When a substitute provider (locum tenens) was used, enter that provider''s
    information here.

    - Use when the provider applies to the entire claim or to at least one service
    line. For example, if a claim had two service lines with two different rendering
    providers, you would include the provider for the first service line here and
    leave the `claimInformation.serviceLines[].renderingProvider` object for that
    service line blank. Then, you would specify the second provider in the appropriate
    service line''s `claimInformation.serviceLines[].renderingProvider` object.

    - You can omit this object when the rendering provider is the same as the billing
    provider. In that case, you would include the provider''s information in the `billing`
    object and leave this object blank.'
