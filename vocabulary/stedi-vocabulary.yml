- name: ClaimServiceFacilityLocation
  description: 'Required when the location for the service is different from the billing
    provider''s address. The purpose of this object is to identify specifically where
    the service was rendered. This can be healthcare facilities, such as surgical
    centers or reference labs, OR the patient''s address when services were rendered
    in their home.

    - Only include this object when the service facility location is **different**
    from the billing provider''s address. If you include this object when the address
    is the same, Stedi omits all of the service facility location information from
    the claim submission, including the name and any identifiers.

    - For telehealth services, the service facility location is the provider''s address,
    even though the patient may have been in their home or elsewhere when receiving
    services.

    - Don''t use this object when reporting ambulance services - use `ambulancePickupLocation`
    and `ambulanceDropoffLocation` instead.

    - Sometimes the billing provider is an actual physician group that is located
    at the same address as a hospital, but is in fact a separate entity. In this case,
    you can differentiate the service facility location by including the specific
    suite or building number of the physician group. This ensures that the service
    facility location is different from the billing provider''s address and is reported
    accurately.'
