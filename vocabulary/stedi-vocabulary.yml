- name: Encounter
  description: 'Details about the eligibility or benefit information you are requesting
    for the patient.

    - If you don''t specify either `serviceTypeCodes` or a `procedureCode` and `productOrServiceIDQualifier`,
    Stedi defaults to using `30` (Plan coverage and general benefits) as the only
    `serviceTypeCodes` value.

    - You can specify either a single `dateOfService` or a `beginningDateOfService`
    and `endDateOfService`. The payer defaults to using the current date in their
    timezone if you don''t include one.

    - When checking eligibility for today, omit the `dateOfService` property to ensure
    consistent behavior across payers.

    - We recommend submitting dates up to 12 months in the past or up to the end of
    the current month. Payers aren''t required to support dates outside these ranges.
    However, some payers such as the Centers for Medicare and Medicaid Services (CMS)
    do support requests for dates further in the future - especially the next calendar
    month. Check the payer''s documentation to determine their specific behavior.'
