    benefits to the provider. Can be set to `A` - Assigned, `B` - Assignment Accepted
    on Clinical Lab Services Only, or `C` - Not Assigned. Choose `A` when the provider
    accepts assignment and/or has a participation agreement with the destination payer,
    OR the provider does not accept assignment and/or have a participation agreement,
    but is advising the payer to adjudicate this specific claim under the participating
    provider benefits allowed under certain plans.
