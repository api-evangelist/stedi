- name: RequestDependentProviderCode
  description: "Use this for providers that are not requesting the eligibility check\
    \ - the requestor is specified in the `provider` object. For example, if you are\
    \ a hospital making an eligibility request, this is where you would specify information\
    \ about a referring provider's role. \n\n You can use one of the following: `AD`\
    \ - Admitting, `AT` - Attending, `BI` - Billing, `CO` - Consulting, `CV` - Covering,\
    \ `H` - Hospital, `HH` - Home Health Care, `LA` - Laboratory, `OT` - Other Physician,\
    \ `P1` - Pharmacist, `P2` - Pharmacy, `PC` - Primary Care Physician, `PE`- Performing,\
    \ `R`- Rural Health Clinic, `RF` - Referring, `SB` - Submitting, `SK` - Skilled\
    \ Nursing Facility, `SU` - Supervising"
