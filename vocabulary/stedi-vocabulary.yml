- name: PlanDateInformation
  description: 'Contains the dates associated with the subscriber and dependents''
    (if applicable) insurance plan. This information is used to determine their eligibility
    for benefits.

    - Most fields contain a single date, but some can contain either a single date
    or a date range. Each field''s documentation specifies its format.

    - Fields that can contain either a single date or date range include: `plan`,
    `eligibility`, `planBegin`, `admission`, and `service`.

    - The provided dates apply to every benefit within the patient''s health plan
    unless specifically noted within a `benefitsInformation[].benefitsDateInformation`
    object.

    - If the payer sends back date(s) that are different for the subscriber and dependents,
    Stedi includes only the dates for the dependent in this object and omits the subscriber''s
    date(s). Dependents can have different coverage dates than the subscriber due
    to qualifying life events, such as starting a new job or passing the age limit
    for coverage through their parent''s plan.

    - Most payers return either `plan` or `planBegin` and `planEnd`, but the exact
    dates returned depend on the payer''s discretion and the patient''s insurance
    plan.

    - If the date of service is after the earliest ending `plan`, `eligibility`, `planEnd`,
    `eligibilityEnd`, `policyEffective`, or `policyExpiration` value, the patient
    likely doesn''t have active coverage.'
  source: healthcare
  type: object
